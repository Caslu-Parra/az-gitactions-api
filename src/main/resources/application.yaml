spring:
    application:
        name: github

# Actuator - Health Check
management:
  endpoints:
    enabled-by-default: false
    web:
      base-path: /
      exposure:
        include: health

  endpoint:
    health:
      enabled: true
      probes:
        enabled: true
      show-details: NEVER
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,ping

  health:
    ping:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true